<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>About me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --main-color: #667eea;
      --bg-gradient: linear-gradient(135deg, #667eea, #2e77bb);
      --text-color: white;
      --card-bg: rgba(255,255,255,0.2);
    }

    body.dark {
      --bg-gradient: linear-gradient(135deg, #1e1e1e, #2c2c2c);
      --text-color: #f1f1f1;
      --card-bg: rgba(0,0,0,0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg-gradient);
      color: var(--text-color);
      transition: 0.3s;
    }

    .container {
      display: flex;
      width: 90%;
      max-width: 1000px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .form, .preview {
      flex: 1;
      padding: 30px;
    }

    .form {
      background: rgba(255,255,255,0.15);
    }

    h2 {
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 15px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      outline: none;
    }

    textarea {
      resize: none;
      height: 100px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      align-items: center;
    }

    .preview {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }

    .card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      border: 3px solid var(--main-color);
    }

    .card h3 {
      margin-bottom: 10px;
      color: var(--main-color);
    }

    .social-link {
      display: inline-block;
      margin-top: 15px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="form">
    <h2>Deine Infos</h2>

    <div class="controls">
      <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
      <input type="color" id="colorPicker">
    </div>

    <input type="text" id="name" placeholder="Dein Name">
    <input type="text" id="job" placeholder="Beruf / Rolle">

    <!-- Bild Upload -->
    <input type="file" id="imageUpload" accept="image/*">

    <textarea id="bio" placeholder="Erzähl etwas über dich..."></textarea>

    <!-- Social Media -->
    <input type="url" id="social" placeholder="Dein Social Media Link">
  </div>

  <div class="preview">
    <div class="card">
      <img id="previewImg" src="https://via.placeholder.com/100">
      <h3 id="previewName">Dein Name</h3>
      <p id="previewJob">Dein Beruf</p>
      <p id="previewBio">Hier steht dein Text...</p>

      <a id="previewSocial" class="social-link" href="#" target="_blank">
        Mein Social Media
      </a>
    </div>
  </div>

</div>

<script>
  const nameInput = document.getElementById("name");
  const jobInput = document.getElementById("job");
  const bioInput = document.getElementById("bio");
  const socialInput = document.getElementById("social");
  const imageUpload = document.getElementById("imageUpload");
  const colorPicker = document.getElementById("colorPicker");

  let uploadedImage = "";

  function updatePreview() {
    document.getElementById("previewName").textContent =
      nameInput.value || "Dein Name";

    document.getElementById("previewJob").textContent =
      jobInput.value || "Dein Beruf";

    document.getElementById("previewBio").textContent =
      bioInput.value || "Hier steht dein Text...";

    const socialLink = document.getElementById("previewSocial");

    if (socialInput.value) {
      socialLink.href = socialInput.value;
      socialLink.style.display = "inline-block";
    } else {
      socialLink.style.display = "none";
    }

    if (uploadedImage) {
      document.getElementById("previewImg").src = uploadedImage;
    }

    saveData();
  }

  imageUpload.addEventListener("change", function () {
    const file = this.files[0];

    if (file) {
      const reader = new FileReader();

      reader.onload = function (e) {
        uploadedImage = e.target.result;
        document.getElementById("previewImg").src = uploadedImage;
        saveData();
      };

      reader.readAsDataURL(file);
    }
  });

  function saveData() {
    const data = {
      name: nameInput.value,
      job: jobInput.value,
      bio: bioInput.value,
      social: socialInput.value,
      image: uploadedImage,
      color: colorPicker.value,
      dark: document.body.classList.contains("dark")
    };

    localStorage.setItem("profileData", JSON.stringify(data));
  }

  function loadData() {
    const data = JSON.parse(localStorage.getItem("profileData"));

    if (!data) return;

    nameInput.value = data.name || "";
    jobInput.value = data.job || "";
    bioInput.value = data.bio || "";
    socialInput.value = data.social || "";
    uploadedImage = data.image || "";
    colorPicker.value = data.color || "#667eea";

    if (uploadedImage) {
      document.getElementById("previewImg").src = uploadedImage;
    }

    if (data.dark) {
      document.body.classList.add("dark");
    }

    document.documentElement.style.setProperty(
      "--main-color",
      data.color
    );

    updatePreview();
  }

  function toggleDarkMode() {
    document.body.classList.toggle("dark");
    saveData();
  }

  colorPicker.addEventListener("input", () => {
    document.documentElement.style.setProperty(
      "--main-color",
      colorPicker.value
    );
    saveData();
  });

  nameInput.addEventListener("input", updatePreview);
  jobInput.addEventListener("input", updatePreview);
  bioInput.addEventListener("input", updatePreview);
  socialInput.addEventListener("input", updatePreview);

  loadData();
</script>

</body>
</html>
